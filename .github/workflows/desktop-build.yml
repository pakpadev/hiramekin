name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner: windows-latest
            artifact_glob: src-tauri/target/release/bundle/nsis/*
          - name: macos
            runner: macos-latest
            artifact_glob: src-tauri/target/release/bundle/dmg/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Typecheck
        run: npm run typecheck

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: hiramekin-${{ matrix.platform.name }}-bundle
          path: ${{ matrix.platform.artifact_glob }}
          if-no-files-found: error
